name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/cybersapienseci/alphagateway

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.IMAGE_NAME }}:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp up \
            --name api-gateway \
            --resource-group gr-alphaeci-prod \
            --environment gr-alphaeci-prod \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --registry-server ghcr.io \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GITHUB_TOKEN }} \
            --ingress external \
            --target-port 8080

          az containerapp update \
            --name api-gateway \
            --resource-group gr-alphaeci-prod \
            --min-replicas 0 \
            --max-replicas 1

      - name: Show app URL
        run: |
          az containerapp show --name api-gateway --resource-group gr-alphaeci-prod \
            --query "properties.configuration.ingress.fqdn" -o tsv
